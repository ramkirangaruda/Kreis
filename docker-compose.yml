services:

  app:
    build: .

    container_name: kreis-app

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+asyncpg://kreis:password@pgbouncer:5432/kreis_ims
      REDIS_URL: redis://redis:6379

    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started

    restart: unless-stopped

    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

    volumes:
      - .:/app
      - ./uploads:/app/uploads

  celery_worker:
    build: .

    container_name: kreis-celery

    command: celery -A app.tasks worker --loglevel=info --concurrency=2 -Q default

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+asyncpg://kreis:password@pgbouncer:5432/kreis_ims
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app

    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started

    volumes:
      - .:/app
      - ./uploads:/app/uploads

    restart: unless-stopped

  celery_beat:
    build: .

    container_name: kreis-celery-beat

    command: celery -A app.tasks beat --loglevel=info

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+asyncpg://kreis:password@pgbouncer:5432/kreis_ims
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    volumes:
      - .:/app

    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer

    container_name: kreis-pgbouncer

    environment:
      DATABASE_URL: "postgres://kreis:password@postgres:5432/kreis_ims"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      # Plain client auth on the trusted internal Docker network avoids the
      # Postgres-15 SCRAM ↔ PgBouncer md5 "wrong password type" mismatch.
      AUTH_TYPE: plain
      # asyncpg sends parameters that pgbouncer must ignore in txn pooling mode
      IGNORE_STARTUP_PARAMETERS: extra_float_digits

    depends_on:
      postgres:
        condition: service_healthy

    restart: unless-stopped

  postgres:
    image: postgres:15

    container_name: kreis-postgres

    environment:
      POSTGRES_USER: kreis
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kreis_ims

    # No published port — the database is only reachable on the internal
    # Docker network, not from the host / public internet.

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kreis -d kreis_ims"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: kreis-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

volumes:
  postgres_data:

