version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: kreis
      POSTGRES_PASSWORD: password
      POSTGRES_DB: kreis_ims
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
