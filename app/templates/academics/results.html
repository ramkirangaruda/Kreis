{% extends "base.html" %}
{% block title %}Results — {{ exam.name }}{% endblock %}

{% block content %}
<div class="page-header d-print-none">
    <div class="row align-items-center">
        <div class="col-auto">
            <a href="/academics/" class="btn btn-outline-secondary btn-sm"><i class="ti ti-arrow-left"></i> Back</a>
        </div>
        <div class="col">
            <h2 class="page-title">{{ exam.name }} — Results</h2>
            <div class="page-subtitle-text">{{ exam.exam_type.value|replace("_"," ")|title }} · {{ exam.start_date }}</div>
        </div>
        <div class="col-auto ms-auto">
            <a class="btn btn-outline-secondary"
               href="/academics/exams/{{ exam.id }}/results/export{% if selected_class_section_id %}?class_section_id={{ selected_class_section_id }}{% endif %}">
                <i class="ti ti-file-spreadsheet"></i> Export to Excel
            </a>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <select name="class_section_id" class="form-select" style="max-width:280px"
                hx-get="/academics/exams/{{ exam.id }}/results"
                hx-target="#results-table" hx-swap="innerHTML">
            <option value="">All Classes</option>
            {% for cs in class_sections %}
            <option value="{{ cs.id }}" {% if selected_class_section_id == cs.id %}selected{% endif %}>
                {{ cs.grade }} - {{ cs.section }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div id="results-table">
        {% include "partials/results_table.html" %}
    </div>
</div>
{% endblock %}
