<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — KREIS IMS</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/css/app.css">
</head>

<body class="login-page">

    <div class="login-wrap">
        <div class="login-card">

            <div class="login-brand">
                <div class="login-logo"><i class="ti ti-building-warehouse"></i></div>
                <h1>KREIS IMS</h1>
                <p>Inventory Management System</p>
            </div>

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="ti ti-alert-circle me-2"></i>
                <div>{{ error }}</div>
            </div>
            {% endif %}

            <form method="post" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-3">
                    <label class="form-label">Email address</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="you@kreis.edu" autofocus required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Your password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="ti ti-login me-1"></i> Sign in
                </button>
            </form>

        </div>

        <div class="login-footer">
            Karnataka Residential Educational Institutions Society
        </div>
    </div>

</body>

</html>
